<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Твій вік</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── screens ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .screen.out-up    { opacity: 0; transform: translateY(-40px); pointer-events: none; }
    .screen.out-down  { opacity: 0; transform: translateY(40px);  pointer-events: none; }
    .screen.in        { opacity: 1; transform: translateY(0);      pointer-events: auto; }

    /* ── INTRO ── */
    .intro {
      max-width: 520px; width: 100%;
      display: flex; flex-direction: column; gap: 2.5rem;
    }
    .eyebrow {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: #3a3a3a;
    }
    h1 {
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; color: #fff;
    }
    h1 em { font-style: normal; color: #555; }
    .sub { font-size: clamp(1rem, 3vw, 1.2rem); font-weight: 300; color: #555; }

    /* magnetic button wrapper */
    .btn-wrap {
      align-self: flex-start;
      display: inline-block;
    }
    .btn {
      display: block;
      background: #fff; color: #0a0a0a;
      font-family: inherit; font-size: 0.85rem;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 1rem 2rem; border: none; border-radius: 50px; cursor: pointer;
      transition: background 0.2s;
      will-change: transform;
    }
    .btn:hover  { background: #e0e0e0; }
    .btn:active { filter: brightness(0.92); }

    /* ── STEP screens ── */
    .step-wrap {
      max-width: 480px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 2.5rem;
    }

    .step-header {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      background: none; border: none; color: #333;
      font-family: inherit; font-size: 0.7rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: color 0.15s;
    }
    .back-btn:hover { color: #666; }

    .step-dots { display: flex; gap: 6px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #222;
      transition: background 0.3s;
    }
    .dot.active { background: #fff; }

    .step-label {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: #333; align-self: flex-start;
    }

    .num-row {
      display: flex; align-items: center; gap: 1.5rem;
    }
    .arrow-btn {
      background: none; border: 1px solid #1e1e1e; border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      color: #444; font-size: 1.2rem; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .arrow-btn:hover  { border-color: #444; color: #aaa; transform: scale(1.08); }
    .arrow-btn:active { transform: scale(0.95); }

    /* big editable input */
    .big-num {
      font-size: clamp(5rem, 22vw, 8rem);
      font-weight: 900; letter-spacing: -0.04em; line-height: 1;
      color: #fff; text-align: center;
      background: none; border: none; outline: none;
      font-family: inherit;
      -webkit-appearance: none; appearance: none;
      caret-color: #fff;
      cursor: text;
      /* hide number spinners */
      -moz-appearance: textfield;
    }
    .big-num::-webkit-outer-spin-button,
    .big-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .big-num::placeholder { color: #222; }
    .big-num:focus { color: #fff; }

    /* month grid */
    .month-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem; width: 100%;
    }
    .month-cell {
      background: #111; border: 1px solid #1a1a1a; border-radius: 8px;
      padding: 0.9rem 0.5rem; text-align: center;
      font-size: 0.9rem; font-weight: 400; color: #555;
      cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .month-cell:hover  { background: #181818; color: #ccc; }
    .month-cell.sel    { background: #fff; color: #0a0a0a; border-color: #fff; font-weight: 700; }

    .next-btn {
      width: 100%;
      background: #fff; color: #0a0a0a;
      font-family: inherit; font-size: 0.85rem;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 1rem; border: none; border-radius: 50px; cursor: pointer;
      transition: background 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
      opacity: 0.25;
    }
    .next-btn.ready        { opacity: 1; }
    .next-btn.ready:hover  { background: #e0e0e0; transform: scale(1.03); }
    .next-btn.ready:active { transform: scale(0.99); }

    /* ── RESULT ── */
    #s-result { align-items: flex-start; overflow-y: auto; padding-top: 3rem; padding-bottom: 3rem; }
    .result-wrap {
      max-width: 480px; width: 100%;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .res-label {
      font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: #2e2e2e;
    }
    .res-number {
      font-size: clamp(6rem, 26vw, 9rem);
      font-weight: 900; letter-spacing: -0.04em; line-height: 0.9;
      color: #fff;
    }
    .res-feels-row {
      margin-top: 1.2rem;
      display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap;
    }
    .res-feels-label {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: #444; font-weight: 300;
    }
    .res-feels-num {
      font-size: clamp(3rem, 14vw, 5rem);
      font-weight: 900; letter-spacing: -0.04em; line-height: 1;
      color: #666;
    }
    .res-again {
      margin-top: 1.8rem; align-self: flex-start;
      background: none; border: 1px solid #222; border-radius: 50px;
      color: #444; font-family: inherit; font-size: 0.7rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.7rem 1.4rem; cursor: pointer;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }
    .res-again:hover { border-color: #444; color: #aaa; transform: scale(1.04); }

    /* ── STATS ── */
    .stats {
      margin-top: 2rem;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.8rem; width: 100%;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .stats.visible { opacity: 1; transform: translateY(0); }
    .stat-card {
      background: #0f0f0f; border: 1px solid #161616;
      border-radius: 10px; padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .stat-val {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900; letter-spacing: -0.03em; color: #fff; line-height: 1;
    }
    .stat-label {
      font-size: 0.62rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: #333; font-weight: 400;
    }
  </style>
</head>
<body>

<!-- 0. Intro -->
<div class="screen in" id="s-intro">
  <div class="intro">
    <div class="eyebrow">калькулятор віку</div>
    <h1>Завжди хотіли дізнатися<br/><em>свій точний вік?</em></h1>
    <p class="sub">Гарні новини.</p>
    <div class="btn-wrap" id="btn-wrap">
      <button class="btn" id="btn-start">Дізнатися вік</button>
    </div>
  </div>
</div>

<!-- 1. Year -->
<div class="screen out-down" id="s-year">
  <div class="step-wrap">
    <div class="step-header">
      <button class="back-btn" data-to="s-intro">← назад</button>
      <div class="step-dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <div class="step-label">Рік народження</div>
    <div class="num-row">
      <button class="arrow-btn" id="year-dec">−</button>
      <input class="big-num" id="year-val" type="number" inputmode="numeric"
             min="1900" max="2099" placeholder="????" />
      <button class="arrow-btn" id="year-inc">+</button>
    </div>
    <button class="next-btn" id="year-next">Далі →</button>
  </div>
</div>

<!-- 2. Month -->
<div class="screen out-down" id="s-month">
  <div class="step-wrap">
    <div class="step-header">
      <button class="back-btn" data-to="s-year">← назад</button>
      <div class="step-dots">
        <div class="dot"></div><div class="dot active"></div><div class="dot"></div>
      </div>
    </div>
    <div class="step-label">Місяць народження</div>
    <div class="month-grid" id="month-grid"></div>
    <button class="next-btn" id="month-next">Далі →</button>
  </div>
</div>

<!-- 3. Day -->
<div class="screen out-down" id="s-day">
  <div class="step-wrap">
    <div class="step-header">
      <button class="back-btn" data-to="s-month">← назад</button>
      <div class="step-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot active"></div>
      </div>
    </div>
    <div class="step-label">День народження</div>
    <div class="num-row">
      <button class="arrow-btn" id="day-dec">−</button>
      <input class="big-num" id="day-val" type="number" inputmode="numeric"
             min="1" max="31" placeholder="??" />
      <button class="arrow-btn" id="day-inc">+</button>
    </div>
    <button class="next-btn" id="day-next">Розрахувати</button>
  </div>
</div>

<!-- 4. Result -->
<div class="screen out-down" id="s-result">
  <div class="result-wrap">
    <div class="res-label">твій вік</div>
    <div class="res-number" id="res-num">0</div>
    <div class="res-feels-row">
      <span class="res-feels-label">відчувається як</span>
      <span class="res-feels-num" id="res-feels">0</span>
    </div>
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-val" id="stat-days">—</div>
        <div class="stat-label">днів</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-weeks">—</div>
        <div class="stat-label">тижнів</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-months">—</div>
        <div class="stat-label">місяців</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-seasons">—</div>
        <div class="stat-label">сезонів</div>
      </div>
    </div>
    <button class="res-again" id="btn-again">↺ ще раз</button>
  </div>
</div>

<script>
  // ── Audio ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let actx = null;
  function initAudio() { if (!actx) actx = new AudioCtx(); }

  // ── Касовий апарат ──
  // Кожна клавіша: короткий металевий "клік" + дзвінок
  function cashKey(volume = 1) {
    if (!actx) return;
    const t = actx.currentTime;

    // 1) Механічний удар клавіші — шум з bandpass
    const keyDur = 0.04;
    const kBuf = actx.createBuffer(1, Math.floor(actx.sampleRate * keyDur), actx.sampleRate);
    const kData = kBuf.getChannelData(0);
    for (let i = 0; i < kData.length; i++)
      kData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (kData.length * 0.15));
    const kSrc = actx.createBufferSource(); kSrc.buffer = kBuf;
    const kBp = actx.createBiquadFilter(); kBp.type = 'bandpass'; kBp.frequency.value = 2400; kBp.Q.value = 1.2;
    const kG = actx.createGain(); kG.gain.setValueAtTime(0.12 * volume, t);
    kSrc.connect(kBp); kBp.connect(kG); kG.connect(actx.destination);
    kSrc.start(t); kSrc.stop(t + keyDur);

    // 2) Металевий дзвінок — синус із загасанням
    const ringDur = 0.12;
    const o = actx.createOscillator();
    const oG = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(1320, t);
    o.frequency.exponentialRampToValueAtTime(880, t + 0.015);
    oG.gain.setValueAtTime(0.07 * volume, t);
    oG.gain.exponentialRampToValueAtTime(0.0001, t + ringDur);
    o.connect(oG); oG.connect(actx.destination);
    o.start(t); o.stop(t + ringDur);
  }

  // Фінальний "дзінь" каси — вищий і довший
  function cashRegister() {
    if (!actx) return;
    const t = actx.currentTime;
    [1760, 2093, 2637].forEach((freq, i) => {
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t + i * 0.07);
      g.gain.linearRampToValueAtTime(0.09, t + i * 0.07 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.07 + 0.4);
      o.connect(g); g.connect(actx.destination);
      o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.4);
    });
  }

  function tick(_, __) { cashKey(0.5); }
  function btnSound() {
    if (!actx) return;
    cashKey(0.8);
    setTimeout(() => cashKey(0.5), 40);
  }

  // ── Magnetic button ──
  const btnWrap = document.getElementById('btn-wrap');
  const btnEl   = document.getElementById('btn-start');
  const STRENGTH = 0.35;

  btnWrap.addEventListener('mousemove', e => {
    const r = btnEl.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top  + r.height / 2;
    const dx = (e.clientX - cx) * STRENGTH;
    const dy = (e.clientY - cy) * STRENGTH;
    btnEl.style.transform = `translate(${dx}px, ${dy}px) scale(1.06)`;
  });
  btnWrap.addEventListener('mouseleave', () => {
    btnEl.style.transform = '';
    btnEl.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.2s';
    setTimeout(() => { btnEl.style.transition = ''; }, 500);
  });

  // ── Screen transitions ──
  function goTo(id, direction = 'forward') {
    const current = document.querySelector('.screen.in');
    if (current) {
      current.classList.remove('in');
      current.classList.add(direction === 'forward' ? 'out-up' : 'out-down');
    }
    const next = document.getElementById(id);
    next.classList.remove('out-up', 'out-down');
    next.getBoundingClientRect(); // force reflow
    next.classList.add('in');
  }

  // ── Months ──
  const MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень',
                  'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
  const grid = document.getElementById('month-grid');
  MONTHS.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'month-cell';
    el.textContent = m;
    el.dataset.month = i + 1;
    el.addEventListener('click', () => {
      initAudio(); tick(660, 0.04);
      document.querySelectorAll('.month-cell').forEach(c => c.classList.remove('sel'));
      el.classList.add('sel');
      state.month = i + 1;
      document.getElementById('month-next').classList.add('ready');
    });
    grid.appendChild(el);
  });

  // ── State ──
  const state = { year: null, month: null, day: null };
  const NOW = new Date();
  const CUR_YEAR = NOW.getFullYear();

  // ── Year ──
  let yearVal = null;
  const yearInput = document.getElementById('year-val');
  const yearNext  = document.getElementById('year-next');

  function setYear(v, silent) {
    v = Math.max(CUR_YEAR - 120, Math.min(CUR_YEAR, v));
    yearVal = v;
    yearInput.value = v;
    state.year = v;
    yearNext.classList.add('ready');
    if (!silent) tick(800, 0.025);
  }

  yearInput.addEventListener('input', () => {
    const v = parseInt(yearInput.value, 10);
    if (!isNaN(v) && String(yearInput.value).length === 4) {
      initAudio();
      setYear(v, true);
      tick(700, 0.035);
    } else {
      state.year = null;
      yearNext.classList.remove('ready');
    }
  });

  document.getElementById('year-dec').addEventListener('click', () => {
    initAudio(); setYear((yearVal ?? CUR_YEAR - 30) - 1);
  });
  document.getElementById('year-inc').addEventListener('click', () => {
    initAudio(); setYear((yearVal ?? CUR_YEAR - 30) + 1);
  });

  // long-press repeat
  function holdRepeat(btn, action) {
    let timer, interval;
    btn.addEventListener('pointerdown', () => {
      action();
      timer = setTimeout(() => { interval = setInterval(action, 80); }, 400);
    });
    const stop = () => { clearTimeout(timer); clearInterval(interval); };
    btn.addEventListener('pointerup', stop);
    btn.addEventListener('pointerleave', stop);
  }
  holdRepeat(document.getElementById('year-dec'), () => { initAudio(); setYear((yearVal ?? CUR_YEAR - 30) - 1); });
  holdRepeat(document.getElementById('year-inc'), () => { initAudio(); setYear((yearVal ?? CUR_YEAR - 30) + 1); });

  // ── Day ──
  let dayVal = null;
  const dayInput = document.getElementById('day-val');
  const dayNext  = document.getElementById('day-next');

  function maxDay() {
    if (!state.month || !state.year) return 31;
    return new Date(state.year, state.month, 0).getDate();
  }
  function setDay(v, silent) {
    v = Math.max(1, Math.min(maxDay(), v));
    dayVal = v;
    dayInput.value = v;
    state.day = v;
    dayNext.classList.add('ready');
    if (!silent) tick(800, 0.025);
  }

  dayInput.addEventListener('input', () => {
    const v = parseInt(dayInput.value, 10);
    if (!isNaN(v) && v >= 1 && v <= maxDay()) {
      initAudio();
      setDay(v, true);
      tick(700, 0.035);
    } else {
      state.day = null;
      dayNext.classList.remove('ready');
    }
  });

  document.getElementById('day-dec').addEventListener('click', () => { initAudio(); setDay((dayVal ?? 1) - 1); });
  document.getElementById('day-inc').addEventListener('click', () => { initAudio(); setDay((dayVal ?? 0) + 1); });
  holdRepeat(document.getElementById('day-dec'), () => { initAudio(); setDay((dayVal ?? 1) - 1); });
  holdRepeat(document.getElementById('day-inc'), () => { initAudio(); setDay((dayVal ?? 0) + 1); });

  // ── Navigation ──
  document.getElementById('btn-start').addEventListener('click', () => {
    initAudio(); btnSound();
    goTo('s-year');
  });

  document.getElementById('year-next').addEventListener('click', () => {
    if (!yearNext.classList.contains('ready')) return;
    initAudio(); tick(900, 0.04);
    goTo('s-month');
  });

  document.getElementById('month-next').addEventListener('click', () => {
    const btn = document.getElementById('month-next');
    if (!btn.classList.contains('ready')) return;
    initAudio(); tick(900, 0.04);
    // don't pre-fill day — leave placeholder
    if (dayVal !== null) dayVal = Math.min(dayVal, maxDay());
    goTo('s-day');
  });

  document.getElementById('day-next').addEventListener('click', () => {
    if (!dayNext.classList.contains('ready')) return;
    initAudio(); tick(1000, 0.05);
    showResult();
  });

  document.querySelectorAll('[data-to]').forEach(btn => {
    btn.addEventListener('click', () => {
      initAudio(); tick(600, 0.03);
      goTo(btn.dataset.to, 'back');
    });
  });

  document.getElementById('btn-again').addEventListener('click', () => {
    initAudio();
    state.year = null; state.month = null; state.day = null;
    yearVal = null; dayVal = null;
    yearInput.value = ''; yearNext.classList.remove('ready');
    document.querySelectorAll('.month-cell').forEach(c => c.classList.remove('sel'));
    document.getElementById('month-next').classList.remove('ready');
    dayInput.value = ''; dayNext.classList.remove('ready');
    goTo('s-intro', 'back');
  });

  // ── Age calc ──
  function calcAge() {
    const dob = new Date(state.year, state.month - 1, state.day);
    let age = NOW.getFullYear() - dob.getFullYear();
    const m = NOW.getMonth() - dob.getMonth();
    if (m < 0 || (m === 0 && NOW.getDate() < dob.getDate())) age--;
    return Math.max(0, age);
  }

  function animateCounter(el, target, onTick) {
    // Розклад часу: кожен наступний крок займає більше часу —
    // перші 80% значень = перші 40% тривалості, останні 20% = 60%
    const DURATION = 2200;
    // Будуємо таблицю "значення → час" щоб перші цифри летіли, останні тяглися
    function valueToTime(v) {
      // x = v/target (0..1), повертає t (0..1) у часі
      // використовуємо зворотну ease-out cubic: t = 1-(1-x)^(1/3) → не те
      // Хочемо: на початку швидко (багато значень за мало часу),
      //         наприкінці повільно (кожна цифра по довгому)
      // Використовуємо x^3 (ease-in для часу = ease-out для значення)
      const x = v / target;
      return Math.pow(x, 2.8);  // час = значення^2.8
    }

    let lastVal = -1;
    let lastFlipTime = 0;

    function frame(ts) {
      if (!frame.startTs) frame.startTs = ts;
      const elapsed = ts - frame.startTs;
      const t = Math.min(elapsed / DURATION, 1);

      // обернена функція: знаходимо значення для поточного часу t
      // t = (v/target)^2.8  →  v = target * t^(1/2.8)
      const cur = t === 1 ? target : Math.floor(target * Math.pow(t, 1 / 2.8));

      if (cur !== lastVal) {
        lastVal = cur;
        el.textContent = cur;
        // звук тільки якщо пройшло достатньо часу (уповільнення = довші паузи)
        const now = performance.now();
        const minGap = 30 + (cur / target) * 180; // від 30мс до 210мс між звуками
        if (now - lastFlipTime >= minGap) {
          lastFlipTime = now;
          if (onTick) onTick(cur);
        }
      }

      if (t < 1) requestAnimationFrame(frame);
      else { el.textContent = target; if (onTick) onTick(target); }
    }
    requestAnimationFrame(frame);
  }

  function calcStats() {
    const dob = new Date(state.year, state.month - 1, state.day);
    const totalDays = Math.floor((NOW - dob) / 86400000);
    const totalMonths = (NOW.getFullYear() - state.year) * 12
      + (NOW.getMonth() - (state.month - 1))
      - (NOW.getDate() < state.day ? 1 : 0);
    return {
      days:    totalDays.toLocaleString('uk-UA'),
      weeks:   Math.floor(totalDays / 7).toLocaleString('uk-UA'),
      months:  totalMonths.toLocaleString('uk-UA'),
      seasons: Math.floor(totalDays / 91).toLocaleString('uk-UA'),
    };
  }

  function showResult() {
    const age   = calcAge();
    const offset = 3 + Math.floor(Math.random() * 5);
    const feels  = Math.max(0, age - offset);
    const stats  = calcStats();

    document.getElementById('res-num').textContent = '0';
    document.getElementById('res-feels').textContent = '0';
    document.getElementById('stats').classList.remove('visible');
    ['stat-days','stat-weeks','stat-months','stat-seasons'].forEach(id => {
      document.getElementById(id).textContent = '—';
    });

    goTo('s-result');

    setTimeout(() => {
      animateCounter(document.getElementById('res-num'), age, cur => {
        cashKey(0.45 + (cur / (age || 1)) * 0.45);
      });
      setTimeout(() => {
        animateCounter(document.getElementById('res-feels'), feels, null);
      }, 400);
      // статистика з'являється після лічильника
      setTimeout(() => {
        document.getElementById('stat-days').textContent    = stats.days;
        document.getElementById('stat-weeks').textContent   = stats.weeks;
        document.getElementById('stat-months').textContent  = stats.months;
        document.getElementById('stat-seasons').textContent = stats.seasons;
        document.getElementById('stats').classList.add('visible');
        cashRegister();
      }, 2700);
    }, 300);
  }
</script>
